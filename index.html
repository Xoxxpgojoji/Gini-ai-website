<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gini AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/model1.css">

  <style>
    /* CHAT BUTTON */
    #chatBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      z-index: 1000;
    }

    /* CHAT BOX */
    #chatBox {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      background: #111;
      color: #fff;
      border-radius: 12px;
      padding: 10px;
      z-index: 1000;
    }

    #messages {
      height: 200px;
      overflow-y: auto;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #userInput {
      width: 70%;
      padding: 5px;
      border: none;
      outline: none;
    }

    #sendBtn {
      width: 25%;
      padding: 5px;
      background: #fff;
      color: #000;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header id="mainHeader">
    <div class="logo">Gini AI</div>
  </header>

  <!-- HERO SECTION -->
  <section class="section hero-section">
    <div class="hero-content reveal">
      <h1>Gini AI</h1>
      <p>Designing Intelligence for the Future</p>

      <!-- 🔥 TALK TO GINI BUTTON -->
      <button id="chatBtn">Talk to Gini</button>

      <div class="swipe-indicator">
        <span>Swipe to explore</span>
        <div class="swipe-line"></div>
      </div>
    </div>
  </section>

  <!-- 🔥 CHAT BOX -->
  <div id="chatBox">
    <div id="messages"></div>
    <input type="text" id="userInput" placeholder="Type message...">
    <button id="sendBtn">Send</button>
  </div>

  <!-- JS -->
  <script>
    const chatBtn = document.getElementById("chatBtn");
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");

    chatBtn.onclick = () => {
      chatBox.style.display = "block";
    };

    sendBtn.onclick = sendMessage;

    function sendMessage() {
      let input = document.getElementById("userInput").value;
      let messages = document.getElementById("messages");

      if (input.trim() === "") return;

      // USER MESSAGE
      messages.innerHTML += `<p><b>You:</b> ${input}</p>`;

      // BASIC AI REPLY
      let reply = "Hello, I am Gini AI";

      if (input.toLowerCase().includes("hello")) {
        reply = "Hello ANMOL 👋";
      } else if (input.toLowerCase().includes("who are you")) {
        reply = "I am Gini, your personal AI assistant";
      }

      messages.innerHTML += `<p><b>Gini:</b> ${reply}</p>`;

      document.getElementById("userInput").value = "";
      messages.scrollTop = messages.scrollHeight;
    }
  </script>

</body>
</html>
