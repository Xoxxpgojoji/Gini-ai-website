<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gini AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/base.css">

        <img src="assets/gini-model1/img3.png">
        <img src="assets/gini-model1/img4.png">

    </div>
  </section>

  <!-- ================= SECTION 3 : FUTURE ================= -->
  <section class="section future-section reveal">
    <h2>Future Vision</h2>
    <p>Human-AI harmony, thoughtfully designed.</p>
  </section>

  <script src="js/scroll.js"></script>
  <script src="js/slider.js"></script>
