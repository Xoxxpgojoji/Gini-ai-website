<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gini AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/model1.css">
</head>
<body>

  <!-- STICKY HEADER (SCROLL PE AAYEGA) -->
  <header id="mainHeader">
    <div class="logo">Gini AI</div>
  </header>

  <!-- HERO SECTION (PAGE 1) -->
  <section class="section hero-section">
    <div class="hero-content reveal">
      <h1>Gini AI</h1>
      <p>Designing Intelligence for the Future</p>
      <button class="hero-btn">Explore</button>
    </div>
  </section>

  <!-- MODEL 1 SECTION (PAGE 2) -->
  <section class="section model-section">
    <h2 class="model-title">Gini – Model 1</h2>

    <div class="slider" data-slider="model1">
      <div class="slides">
        <img src="assets/gini-model1/img1.png">
        <img src="assets/gini-model1/img2.png">
        <img src="assets/gini-model1/img3.png">
        <img src="assets/gini-model1/img4.png">
      </div>
    </div>
  </section>

  <!-- FUTURE / HERO AGAIN (PAGE 3) -->
  <section class="section future-section reveal">
    <h2>Future Vision</h2>
    <p>Human–AI harmony, calm and trustworthy.</p>
  </section>

  <!-- JS FILES -->
  <script src="js/main.js"></script>
  <script src="js/slider.js"></script>
  <script src="js/scroll.js"></script>

</body>
</html>
